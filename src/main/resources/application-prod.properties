############################################
# SPRING PROFILE (Production)
############################################

############################################
# EMAIL SERVICE (PRODUCTION)
############################################
email.fake=false

############################################
# DATABASE (PRODUCTION)
############################################
spring.datasource.url=jdbc:mysql://<PROD_HOST>:3306/todo_api_prod_db?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=<PROD_USER>
spring.datasource.password=<PROD_PASSWORD>

# Connection pool (production tuned)
spring.datasource.tomcat.test-while-idle=true
spring.datasource.tomcat.validation-query=SELECT 1
spring.datasource.tomcat.initial-size=20
spring.datasource.tomcat.max-wait=30000
spring.datasource.tomcat.max-active=100
spring.datasource.tomcat.max-idle=30
spring.datasource.tomcat.min-idle=10

############################################
# JPA / HIBERNATE (PRODUCTION)
############################################
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

############################################
# SWAGGER (DISABLED IN PROD)
############################################
springdoc.swagger-ui.enabled=false

############################################
# SERVER
############################################
server.port=8080

############################################
# LOGGING (PRODUCTION)
############################################
logging.level.org.springframework=INFO
logging.level.com.todoapi=INFO