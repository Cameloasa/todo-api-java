############################################
# EMAIL SERVICE (DEV MODE)
############################################
email.fake=true

############################################
# DATABASE (DEV)
############################################
spring.datasource.url=jdbc:mysql://localhost:3306/todo-api-db?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin
spring.datasource.username=root
spring.datasource.password=root1234

# Connection pool (safe defaults)
spring.datasource.tomcat.test-while-idle=true
spring.datasource.tomcat.validation-query=SELECT 1
spring.datasource.tomcat.initial-size=10
spring.datasource.tomcat.max-wait=20000
spring.datasource.tomcat.max-active=50
spring.datasource.tomcat.max-idle=20
spring.datasource.tomcat.min-idle=5

############################################
# JPA / HIBERNATE
############################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

############################################
# SWAGGER
############################################
springdoc.swagger-ui.path=/swagger-ui.html

############################################
# SERVER
############################################
server.port=8080
